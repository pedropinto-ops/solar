name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hotel
          POSTGRES_PASSWORD: hotel_dev_password
          POSTGRES_DB: hotel_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hotel:hotel_dev_password@localhost:5432/hotel_platform_test
      JWT_SECRET: ci-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Habilitar extensões Postgres
        run: |
          PGPASSWORD=hotel_dev_password psql -h localhost -U hotel -d hotel_platform_test \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gist; \
                CREATE EXTENSION IF NOT EXISTS pgcrypto; \
                CREATE EXTENSION IF NOT EXISTS pg_trgm; \
                CREATE EXTENSION IF NOT EXISTS unaccent;"

      - run: pnpm db:generate
      - run: pnpm db:migrate -- --skip-seed
      - run: pnpm typecheck
      - run: pnpm test
