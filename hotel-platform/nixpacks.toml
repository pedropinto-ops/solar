[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  # Restaura permissão de execução dos shims (.bin) — camada de cache do
  # builder às vezes perde o bit de execução ("prisma: Permission denied")
  "find . -path '*/node_modules/.bin/*' -exec chmod +x {} + 2>/dev/null || true",
  # Gera o Prisma Client de forma robusta ao layout do node_modules. Com
  # shamefully-hoist o prisma é hoistado pra raiz (node_modules/prisma); sem
  # hoist, fica no .pnpm. Tenta a raiz hoistada primeiro; se não achar,
  # procura o build/index.js em QUALQUER lugar. Executa com node (já
  # executável) — evita o exec-bit do shim .bin. (O find só-.pnpm anterior
  # voltava vazio com o hoist -> "Cannot find module /app/generate".)
  "PJS=node_modules/prisma/build/index.js; [ -f $PJS ] || PJS=$(find node_modules -path '*/prisma/build/index.js' | head -n1); echo prisma-cli=$PJS; node $PJS generate --schema=packages/database/prisma/schema.prisma",
  "pnpm --filter @hotel/shared build",
  "pnpm --filter @hotel/database build",
  "pnpm --filter @hotel/api build"
]

[start]
cmd = "cd apps/api && pnpm deploy:start"
